<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Master - Sentinela Ops</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Controlo de exibição das abas */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex overflow-hidden">

    <aside class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col justify-between z-10">
        <div class="p-6">
            <h1 class="text-xl font-bold text-blue-400 tracking-wider uppercase">Sentinela Ops</h1>
            <p class="text-xs text-gray-400 mt-1">Gestão Integrada</p>
            
            <nav class="mt-8 space-y-2">
                <button onclick="mudarAba('perfil')" id="btn-perfil" class="tab-btn w-full flex items-center px-4 py-3 bg-blue-600 text-white rounded-lg transition font-medium text-left">
                    Meu Perfil Admin
                </button>
                
                <button onclick="mudarAba('rondas')" id="btn-rondas" class="tab-btn w-full flex items-center px-4 py-3 hover:bg-gray-700 text-gray-300 rounded-lg transition font-medium text-left">
                    Sistema de Rondas
                </button>

                <div class="pt-4 border-t border-gray-700/50 mt-4">
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest px-4 font-bold">Próximos Módulos</p>
                    <p class="text-xs text-gray-400 px-4 py-2 italic flex flex-col space-y-1">
                        <span>• Monitorização</span>
                        <span>• Portal do Empregado</span>
                        <span>• Portal do Cliente</span>
                    </p>
                </div>
            </nav>
        </div>
        
        <div class="p-4 border-t border-gray-700 bg-gray-800">
            <div class="flex items-center space-x-3 mb-2">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <span id="user-display-role" class="text-xs font-semibold bg-gray-700 px-2 py-0.5 rounded text-gray-300">Carregando...</span>
            </div>
            <p id="user-display-name" class="text-sm font-medium text-gray-200 truncate">...</p>
            <button onclick="handleLogout()" class="mt-3 w-full text-center bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white py-1.5 rounded text-xs transition font-semibold border border-red-900/50">
                Sair do Sistema
            </button>
        </div>
    </aside>

    <main class="flex-1 bg-gray-900 overflow-y-auto relative p-8">
        
        <section id="aba-perfil" class="tab-content active max-w-4xl">
            <div class="mb-8">
                <h2 class="text-3xl font-bold text-white">Bem-vindo ao Painel Central</h2>
                <p class="text-gray-400 text-sm mt-1">Acesso validado. Sistemas operacionais prontos.</p>
            </div>

            <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
                <div class="flex items-center space-x-4 border-b border-gray-700 pb-4 mb-4">
                    <div class="h-16 w-16 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-2xl uppercase shadow-inner" id="avatar-letras">
                        --
                    </div>
                    <div>
                        <h3 class="text-2xl font-bold text-white" id="perfil-nome">A carregar...</h3>
                        <span class="inline-block bg-blue-900/60 text-blue-300 border border-blue-700 px-3 py-1 rounded text-xs font-bold mt-2 uppercase tracking-wider">Admin Master</span>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                    <div class="bg-gray-900/80 p-4 rounded-lg border border-gray-700/50">
                        <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Identificador UID</p>
                        <p class="font-mono text-xs text-gray-400 mt-1 truncate" id="perfil-id">---</p>
                    </div>
                    <div class="bg-gray-900/80 p-4 rounded-lg border border-gray-700/50">
                        <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Estado da Ligação</p>
                        <p class="text-green-400 font-semibold mt-1 flex items-center"><span class="w-1.5 h-1.5 bg-green-400 rounded-full mr-2"></span> Online e Seguro</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="aba-rondas" class="tab-content h-full">
            <iframe src="sistemas/rondas.html" class="w-full h-[85vh] border border-gray-700 rounded-lg shadow-2xl bg-gray-800"></iframe>
        </section>

    </main>

    <script>
        const supabaseUrl = 'https://mhhsbdwewohiisnhwxpy.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oaHNiZHdld29oaWlzbmh3eHB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMDc4NTMsImV4cCI6MjA5Njc4Mzg1M30.sBcHdDzwq9yL7pIeGllJhwoR9nxIXrSHRAnr6Hq-Zik'; 
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        async function inicializarPainel() {
            const { data: { session }, error: sessionError } = await sb.auth.getSession();
            if (!session) { window.location.href = "login.html"; return; }

            const { data: perfil } = await sb.from('profiles').select('id, full_name, role').eq('id', session.user.id).maybeSingle();

            if (perfil) {
                const nomeExibicao = perfil.full_name || 'Admin Master';
                document.getElementById('user-display-name').innerText = nomeExibicao;
                document.getElementById('user-display-role').innerText = perfil.role;
                document.getElementById('perfil-nome').innerText = nomeExibicao;
                document.getElementById('perfil-id').innerText = perfil.id;
                document.getElementById('avatar-letras').innerText = nomeExibicao.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
            }
        }

        // Lógica para alternar entre as abas visuais
        function mudarAba(abaDestino) {
            // Oculta todas as abas
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            
            // Remove o estilo azul de todos os botões
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('bg-blue-600', 'text-white');
                el.classList.add('hover:bg-gray-700', 'text-gray-300');
            });

            // Ativa a aba clicada
            document.getElementById(`aba-${abaDestino}`).classList.add('active');
            
            // Colore o botão clicado
            const btn = document.getElementById(`btn-${abaDestino}`);
            btn.classList.remove('hover:bg-gray-700', 'text-gray-300');
            btn.classList.add('bg-blue-600', 'text-white');
        }

        async function handleLogout() {
            await sb.auth.signOut();
            window.location.href = "login.html";
        }

        window.addEventListener('DOMContentLoaded', inicializarPainel);
    </script>
</body>
</html>
