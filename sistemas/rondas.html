<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema Operacional - Rondas</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #0a192f;
            --accent: #ffd600; 
            --danger: #f85149;
            --success: #238636; 
            --bg: #0f1c2e; 
            --card: #16233a;
            --text: #e0e7ff; 
            --text-light: #a3bffa;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: transparent; /* Alterado para integrar com o iframe do master */
            color: var(--text);
            padding: 20px; 
            line-height: 1.4; 
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card { 
            background: var(--card); 
            border: 1px solid #334155; 
            border-radius: 8px; 
            padding: 20px;
            margin-bottom: 20px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .card h3 { 
            margin: 0 0 16px 0; 
            padding-bottom: 10px;
            border-bottom: 3px solid var(--accent); 
            color: var(--accent); 
            font-size: 1.1rem; 
            text-transform: uppercase; 
            font-weight: 700;
        }
        label { 
            display: block; 
            font-size: 0.8rem; 
            font-weight: 600; 
            color: #94a3b8;
            margin: 14px 0 5px 0; 
            text-transform: uppercase; 
        }
        input, select, textarea { 
            width: 100%;
            padding: 13px 14px; 
            background: #1e2a44; 
            border: 1px solid #475569; 
            border-radius: 6px; 
            color: white; 
            font-size: 1rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn { 
            width: 100%; 
            padding: 16px; 
            margin-top: 15px; 
            border: none; 
            border-radius: 6px;
            font-weight: 700; 
            font-size: 0.96rem; 
            text-transform: uppercase; 
            cursor: pointer; 
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-primary { background: var(--accent); color: #0a192f; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-info { background: #2563eb; color: white; }
        .btn-success { background: var(--success); color: white; margin-bottom: 15px;}
        .ronda-entry { 
            background: #1e2a44; 
            padding: 15px; 
            border-radius: 6px; 
            margin-bottom: 10px;
            border-left: 5px solid var(--accent); 
            font-size: 0.9rem; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-small { 
            padding: 8px 12px;
            border-radius: 4px; 
            border: none; 
            font-size: 0.8rem; 
            font-weight: bold; 
            cursor: pointer; 
            margin-left: 10px; 
            background: var(--accent); 
            color: #000;
        }
        .checklist-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-top: 10px;
        }
        .check-item { 
            background: #1e2a44; 
            border: 2px solid #475569; 
            padding: 13px 10px;
            border-radius: 6px; 
            text-align: center; 
            font-size: 0.8rem; 
            cursor: pointer;
            transition: all 0.2s;
        }
        .check-item.ok { 
            border-color: var(--success);
            color: var(--success); 
            background: rgba(35, 134, 54, 0.2); 
        }
        .grid-2 {
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    
    <button class="btn btn-success" onclick="gerarRelatorioPlantao()">📄 GERAR RELATÓRIO DE PLANTÃO (PDF)</button>

    <div class="card">
        <h3>📍 NOVA ATIVIDADE OPERACIONAL</h3>
        
        <button id="btn-intervalo" class="btn btn-info" onclick="gerenciarIntervalo()">☕ INICIAR INTERVALO</button>
        
        <div class="grid-2">
            <div><label>VTR (Placa)</label><input type="text" id="r-placa" placeholder="ABC-1234"></div>
            <div><label>KM</label><input type="number" id="r-km"></div>
        </div>

        <label>Posto / Local</label>
        <input type="text" id="r-posto" placeholder="Ex: Base Central, Portaria Principal">
        
        <div class="grid-2">
            <div><label>Colaborador no Local</label><input type="text" id="r-func" placeholder="Nome"></div>
            <div><label>Matrícula</label><input type="text" id="r-func-mat" placeholder="0000"></div>
        </div>

        <label>Missão</label>
        <select id="r-motivo" onchange="toggleFiscalizacao()">
            <option value="Fiscalização">Fiscalização</option>
            <option value="Assistência">Assistência</option>
            <option value="De base">De base</option>
            <option value="Complemento">Complemento</option>
            <option value="Cobertura">Cobertura</option>
            <option value="Entrega de material">Entrega de material</option>
            <option value="Deslocamento">Deslocamento</option>
            <option value="Treinamento">Treinamento</option>
            <option value="Outros">Outros</option>
        </select>

        <div id="sec-fiscalizacao">
            <label>CHECKLIST TÁTICO</label>
            <div class="checklist-grid" id="checklist">
                <div class="check-item ok" onclick="toggleCheck(this)">APRESENTAÇÃO</div>
                <div class="check-item ok" onclick="toggleCheck(this)">UNIFORME</div>
                <div class="check-item ok" onclick="toggleCheck(this)">POSTURA</div>
                <div class="check-item ok" onclick="toggleCheck(this)">LIVRO OCO.</div>
                <div class="check-item ok" onclick="toggleCheck(this)">MATERIAL</div>
                <div class="check-item ok" onclick="toggleCheck(this)">OUTROS</div>
            </div>
        </div>

        <label>Observações</label>
        <textarea id="r-obs" rows="3" placeholder="Algo fora do normal?"></textarea>

        <label>Foto de Comprovação</label>
        <input type="file" id="r-foto" accept="image/*" capture="environment" onchange="previewImage(this)">
        
        <button class="btn btn-primary" onclick="salvarRonda()">✅ FINALIZAR E GERAR CARD</button>
    </div>

    <div class="card">
        <h3>📋 LOG DE ATIVIDADES (PLANTÃO ATUAL)</h3>
        <div id="historico-rondas"></div>
        <button class="btn btn-danger" onclick="zerarRondasPlantao()" style="margin-top: 20px;">🧹 ZERAR RONDAS (NOVO PLANTÃO)</button>
    </div>
</div>

<script>
// Mantendo a ligação com o seu banco operacional antigo conforme solicitado 
const supabaseUrl = 'https://xbflhqokmrlrbjcvexcx.supabase.co';
const supabaseKey = 'sb_publishable_1odlDvkSkivSDEEU_C19gw_4_GP8h06';
const sb = supabase.createClient(supabaseUrl, supabaseKey);

// Estado Local [cite: 129]
let db = JSON.parse(localStorage.getItem('sentinela_ops_db')) || { perfil: {nome: "Operador Mestre"}, rondas: [], intervaloAtivo: null };
let fotoBase64 = "";
let currentUserUid = "admin_master_uid"; // Fixado para funcionar sem o auth antigo

function saveLocal() { 
    localStorage.setItem('sentinela_ops_db', JSON.stringify(db));
}

// INICIALIZAÇÃO
window.onload = function() {
    renderRondas();
    // Recupera botão de intervalo se estiver ativo [cite: 221, 222, 223]
    if (db.intervaloAtivo) {
        const btn = document.getElementById('btn-intervalo');
        btn.innerText = "☕ EM INTERVALO (CLIQUE P/ VOLTAR)";
        btn.style.background = "var(--danger)";
    }
};

// INTERAÇÕES UI
function toggleCheck(el) { el.classList.toggle('ok'); }

function toggleFiscalizacao() {
    const m = document.getElementById('r-motivo').value;
    document.getElementById('sec-fiscalizacao').style.display = (m === 'Fiscalização') ? 'block' : 'none';
}

function gerenciarIntervalo() {
    const btn = document.getElementById('btn-intervalo');
    if (!db.intervaloAtivo) {
        db.intervaloAtivo = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        btn.innerText = "☕ EM INTERVALO (CLIQUE P/ VOLTAR)";
        btn.style.background = "var(--danger)";
        alert("Intervalo iniciado às " + db.intervaloAtivo);
    } else {
        const fim = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        alert(`Intervalo finalizado!\nInício: ${db.intervaloAtivo}\nFim: ${fim}`);
        db.intervaloAtivo = null;
        btn.innerText = "☕ INICIAR INTERVALO";
        btn.style.background = "#2563eb";
    }
    saveLocal();
}

function previewImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function (e) {
            const img = new Image();
            img.src = e.target.result;
            img.onload = function () {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const maxWidth = 800;
                const scale = maxWidth / img.width;
                canvas.width = maxWidth;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                fotoBase64 = canvas.toDataURL('image/jpeg', 0.7);
            };
        };
        reader.readAsDataURL(input.files[0]);
    }
}

// LÓGICA CORE: SALVAR E RENDERIZAR
async function salvarRonda() {
    const posto = document.getElementById('r-posto').value.trim();
    if(!posto) return alert("Preencha o posto/local!");

    const novaRonda = {
        id: Date.now(),
        uid: currentUserUid,
        posto: posto,
        km: document.getElementById('r-km').value || "0",
        colaborador: document.getElementById('r-func').value || "N/A",
        colaboradorMat: document.getElementById('r-func-mat').value || "N/A",
        motivo: document.getElementById('r-motivo').value,
        obs: document.getElementById('r-obs').value,
        data: new Date().toISOString().split('T')[0],
        hora: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}),
        foto: fotoBase64,
        checklist: {
            "APRESENTAÇÃO": document.querySelectorAll('.check-item')[0].classList.contains('ok') ? "OK" : "REPROVADO",
            "UNIFORME": document.querySelectorAll('.check-item')[1].classList.contains('ok') ? "OK" : "REPROVADO",
            "POSTURA": document.querySelectorAll('.check-item')[2].classList.contains('ok') ? "OK" : "REPROVADO",
            "LIVRO OCO.": document.querySelectorAll('.check-item')[3].classList.contains('ok') ? "OK" : "REPROVADO",
            "MATERIAL": document.querySelectorAll('.check-item')[4].classList.contains('ok') ? "OK" : "REPROVADO",
            "OUTROS": document.querySelectorAll('.check-item')[5].classList.contains('ok') ? "OK" : "REPROVADO"
        }
    };

    // Tenta salvar na nuvem e no local (Offline First)
    try {
        await sb.from('rondas').insert([novaRonda]);
    } catch(e) {
        console.warn("Salvando offline: " + e.message);
    }
    
    db.rondas.unshift(novaRonda);
    saveLocal();
    renderRondas();
    
    // Limpar formulário
    document.getElementById('r-km').value = "";
    document.getElementById('r-obs').value = "";
    document.getElementById('r-func').value = "";
    document.getElementById('r-func-mat').value = "";
    fotoBase64 = "";
    document.getElementById('r-foto').value = "";
    
    alert("✅ Ronda salva com sucesso!");
}

function renderRondas() {
    const container = document.getElementById('historico-rondas');
    if (db.rondas.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:#94a3b8; padding:20px 0;">Nenhuma atividade no plantão atual.</p>';
        return;
    }

    container.innerHTML = db.rondas.map((r) => `
        <div class="ronda-entry">
            <div>
                <strong>${r.hora}</strong> - ${r.posto.toUpperCase()}<br>
                <small style="color:#94a3b8;">${r.motivo} | KM: ${r.km}</small>
            </div>
            <button onclick='gerarCardIndividual(${JSON.stringify(r).replace(/'/g, "'")})' class="btn-small">🖨️ CARD</button>        
        </div>
    `).join('');
}

function zerarRondasPlantao() {
    const confirmar = confirm("ATENÇÃO!\n\nIsto limpará a tela para um novo plantão. Os dados antigos continuam na nuvem.\n\nContinuar?");
    if (!confirmar) return;
    
    db.rondas = [];
    saveLocal();
    renderRondas();
}

// GERAÇÃO DE PDF (MANTIDA INTACTA)
function gerarCardIndividual(r) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: [80, 200] });
    let y = 10;
    doc.setFontSize(10);
    doc.setFont("helvetica", "bold");
    doc.text("COMPROVANTE DE VISITA", 40, y, { align: "center" });
    y += 7;
    if (r.foto) { try { doc.addImage(r.foto, 'JPEG', 5, y, 70, 45); y += 50; } catch (e) { y += 5; } }
    doc.setFontSize(11);
    doc.text(r.posto.toUpperCase(), 40, y, { align: "center" });
    y += 7;
    doc.setFontSize(8);
    doc.setFont("helvetica", "normal");
    doc.text(`Data: ${r.data} | Hora: ${r.hora}`, 5, y);
    y += 5;
    const placaUsada = document.getElementById('r-placa').value || "---";
    doc.text(`VTR: ${placaUsada} | KM: ${r.km}`, 5, y);
    y += 5;
    doc.text(`COLABORADOR: ${r.colaborador.toUpperCase()} | MAT: ${r.colaboradorMat || "---"}`, 5, y);
    y += 8;
    doc.setFont("helvetica", "bold");
    doc.text("STATUS OPERACIONAL:", 5, y);
    doc.setFontSize(7);
    doc.setFont("helvetica", "normal");
    Object.entries(r.checklist || {}).forEach(([item, status]) => {
        y += 4;
        doc.text(`• ${item}: ${status}`, 8, y);
    });
    y += 8;
    doc.setFontSize(8);
    doc.setFont("helvetica", "bold");
    doc.text("OBSERVAÇÕES:", 5, y);
    doc.setFont("helvetica", "normal");
    const obs = doc.splitTextToSize(r.obs, 70);
    doc.text(obs, 5, y + 5);
    y += (obs.length * 5) + 15;
    doc.setFont("helvetica", "bold");
    doc.text(`OPERADOR:`, 5, y);
    y += 5;
    doc.setFont("helvetica", "normal");
    doc.text((db.perfil.nome || "Sistema Master").toUpperCase(), 5, y);
    doc.save(`Card_${r.posto}_${r.hora.replace(':','-')}.pdf`);
}

function gerarRelatorioPlantao() {
    if(db.rondas.length === 0) return alert("Não há rondas neste plantão para gerar relatório.");
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const p = db.perfil;
    let y = 20;

    doc.setFont("helvetica", "bold");
    doc.setFontSize(16);
    doc.text("RELATÓRIO DE PLANTÃO OPERACIONAL", 105, y, { align: "center" });
    y += 15;

    doc.setFontSize(10);
    doc.text("DADOS GERAIS", 10, y);
    y += 6;
    doc.setFont("helvetica", "normal");
    doc.text(`Emissão: ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR')}`, 10, y);
    y += 10;
    doc.setLineWidth(0.5);
    doc.line(10, y, 200, y); 
    y += 10;

    doc.setFont("helvetica", "bold"); 
    doc.text("REGISTROS DE ATIVIDADES", 10, y); 
    y += 8;
    const rondasCrescentes = [...db.rondas].reverse();
    
    rondasCrescentes.forEach((r, index) => {
        if(y > 260) { doc.addPage(); y = 20; }
        doc.setFont("helvetica", "bold"); 
        doc.setFontSize(9);
        
        doc.text(`${index + 1}. POSTO: ${r.posto.toUpperCase()}`, 10, y);
        y += 5; 
        
        doc.setFont("helvetica", "normal");
        doc.text(`Hora: ${r.hora} | Colaborador: ${r.colaborador} | Mat: ${r.colaboradorMat || "---"}`, 15, y);
        y += 5; 
        doc.text(`Motivo: ${r.motivo} | KM: ${r.km}`, 15, y);
        y += 5; 
        
        const obs = doc.splitTextToSize(r.obs, 180); 
        doc.text(obs, 15, y);
        y += (obs.length * 5) + 5; 
        
        doc.setDrawColor(200); 
        doc.line(15, y - 2, 195, y - 2); 
        y += 5;
    });
    doc.save(`Relatorio_Plantao_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.pdf`);
}
</script>
</body>
</html>
