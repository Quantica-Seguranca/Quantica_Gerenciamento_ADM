<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Rondas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-800 text-gray-100 font-sans p-6">

    <div class="max-w-4xl mx-auto">
        <h2 class="text-2xl font-bold text-white mb-6 border-b border-gray-700 pb-2">Registo de Rondas e Ocorrências</h2>

        <div class="bg-gray-900 p-6 rounded-lg shadow-md border border-gray-700 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Posto de Serviço</label>
                    <input type="text" id="posto" class="w-full bg-gray-800 border border-gray-600 text-white rounded px-3 py-2 focus:border-blue-500 focus:outline-none" placeholder="Ex: Base Central, Portaria Principal">
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Motivo da Ronda</label>
                    <select id="motivo" class="w-full bg-gray-800 border border-gray-600 text-white rounded px-3 py-2 focus:border-blue-500 focus:outline-none">
                        <option value="Rotina">Rotina (Padrão)</option>
                        <option value="Abertura">Abertura de Posto</option>
                        <option value="Fechamento">Fechamento de Posto</option>
                        <option value="Ocorrencia">Atendimento de Ocorrência</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-gray-400 text-sm mb-1">Observações do Vigilante</label>
                    <textarea id="obs" rows="3" class="w-full bg-gray-800 border border-gray-600 text-white rounded px-3 py-2 focus:border-blue-500 focus:outline-none" placeholder="Descreva os detalhes encontrados na ronda..."></textarea>
                </div>
            </div>
            <button onclick="registrarRonda()" id="btn-salvar" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded transition shadow-lg">
                Gravar Ronda no Sistema
            </button>
        </div>

        <h3 class="text-xl font-bold text-white mb-4">Últimas Rondas (Tempo Real)</h3>
        <div class="bg-gray-900 rounded-lg shadow border border-gray-700 overflow-x-auto">
            <table class="w-full text-left text-sm text-gray-300">
                <thead class="bg-gray-800 text-gray-400">
                    <tr>
                        <th class="px-4 py-3">Data/Hora</th>
                        <th class="px-4 py-3">Posto</th>
                        <th class="px-4 py-3">Motivo</th>
                        <th class="px-4 py-3">Status</th>
                    </tr>
                </thead>
                <tbody id="tabela-rondas" class="divide-y divide-gray-800">
                    <tr><td colspan="4" class="px-4 py-6 text-center text-gray-500">A carregar dados operacionais...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Conexão Supabase
        const supabaseUrl = 'https://mhhsbdwewohiisnhwxpy.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oaHNiZHdld29oaWlzbmh3eHB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMDc4NTMsImV4cCI6MjA5Njc4Mzg1M30.sBcHdDzwq9yL7pIeGllJhwoR9nxIXrSHRAnr6Hq-Zik'; 
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        async function carregarRondas() {
            const { data, error } = await sb
                .from('events_and_rounds')
                .select('*')
                .eq('system_origin', 'Sistema de Rondas')
                .order('created_at', { ascending: false })
                .limit(10);

            const tbody = document.getElementById('tabela-rondas');
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-4 py-4 text-center text-red-500">Erro: ${error.message}</td></tr>`;
                return;
            }

            tbody.innerHTML = '';
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-6 text-center text-gray-500">Nenhuma ronda registada até ao momento.</td></tr>';
                return;
            }

            data.forEach(ronda => {
                const detalhes = ronda.description.split(' | ');
                const posto = detalhes[0] ? detalhes[0].replace('Posto: ', '') : '-';
                const motivo = detalhes[1] ? detalhes[1].replace('Motivo: ', '') : '-';
                const dataHora = new Date(ronda.created_at).toLocaleString('pt-PT');

                let corMotivo = 'bg-gray-700 text-gray-200';
                if (motivo === 'Ocorrencia') corMotivo = 'bg-red-900/50 text-red-400 border border-red-800';

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-800 transition">
                        <td class="px-4 py-3">${dataHora}</td>
                        <td class="px-4 py-3 font-medium">${posto}</td>
                        <td class="px-4 py-3"><span class="${corMotivo} px-2 py-1 rounded text-xs font-semibold">${motivo}</span></td>
                        <td class="px-4 py-3"><span class="text-green-400 font-semibold">${ronda.status}</span></td>
                    </tr>
                `;
            });
        }

        async function registrarRonda() {
            const posto = document.getElementById('posto').value.trim();
            const motivo = document.getElementById('motivo').value;
            const obs = document.getElementById('obs').value.trim();
            const btn = document.getElementById('btn-salvar');

            if(!posto) return alert("O preenchimento do Posto de Serviço é obrigatório.");

            btn.innerText = "A gravar...";
            btn.disabled = true;

            const { data: { user } } = await sb.auth.getUser();

            const novaRonda = {
                system_origin: 'Sistema de Rondas',
                description: `Posto: ${posto} | Motivo: ${motivo} | Obs: ${obs || 'Sem observações'}`,
                status: 'Concluída',
                created_by: user ? user.id : null
            };

            const { error } = await sb.from('events_and_rounds').insert([novaRonda]);

            btn.innerText = "Gravar Ronda no Sistema";
            btn.disabled = false;

            if (error) {
                alert("Falha ao gravar: " + error.message);
            } else {
                document.getElementById('posto').value = '';
                document.getElementById('obs').value = '';
                carregarRondas();
            }
        }

        window.onload = carregarRondas;
    </script>
</body>
</html>
