<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sentinela Ops</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">

    <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-md border border-gray-700">
        <h2 class="text-2xl font-bold text-white text-center mb-6 uppercase tracking-wider text-blue-400">Sentinela Ops</h2>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-gray-400 text-sm mb-1">E-mail corporativo</label>
                <input type="email" id="email" required class="w-full bg-gray-900 border border-gray-600 text-white rounded px-4 py-2 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-gray-400 text-sm mb-1">Senha</label>
                <input type="password" id="password" required class="w-full bg-gray-900 border border-gray-600 text-white rounded px-4 py-2 focus:outline-none focus:border-blue-500">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition mt-4">
                Acessar Sistema
            </button>
        </form>

        <div id="msg-erro" class="mt-4 text-red-400 text-sm text-center hidden"></div>
    </div>

    <script>
        const supabaseUrl = 'https://mhhsbdwewohiisnhwxpy.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oaHNiZHdld29oaWlzbmh3eHB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMDc4NTMsImV4cCI6MjA5Njc4Mzg1M30.sBcHdDzwq9yL7pIeGllJhwoR9nxIXrSHRAnr6Hq-Zik'; 
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            const msgErro = document.getElementById('msg-erro');

            btn.innerText = 'Autenticando...';
            btn.disabled = true;
            msgErro.classList.add('hidden');

            const { data, error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                msgErro.innerText = "Falha no login: E-mail ou senha incorretos.";
                msgErro.classList.remove('hidden');
                btn.innerText = 'Acessar Sistema';
                btn.disabled = false;
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
